dataset: "Bulgarian"

path:
  corpus_path: "."                                   # base for relative wav paths in the manifest
  manifest_path: "filelists/realdata_local.csv"   # produced by clean_dataset.py
  lexicon_path: "lexicon/bulgarian-grapheme.txt"     # produced by generate_bg_dict.py
  raw_path: "./raw_data/Bulgarian"
  preprocessed_path: "./preprocessed_data/Bulgarian"

preprocessing:
  val_size: 500
  text:
    text_cleaners: ["bulgarian_cleaners"]
    language: "bg"
  audio:
    sampling_rate: 22050
    max_wav_value: 32768.0
  stft:
    filter_length: 1024
    hop_length: 256
    win_length: 1024
  mel:
    n_mel_channels: 80
    mel_fmin: 0
    mel_fmax: 8000 # please set to 8000 for HiFi-GAN vocoder, set to null for MelGAN vocoder
  pitch:
    feature: "phoneme_level" # support 'phoneme_level' or 'frame_level'
    normalization: True
  energy:
    feature: "phoneme_level" # support 'phoneme_level' or 'frame_level'
    normalization: True
